---
deployment:
  tasks:
    - export COMPOSER_HOME=/home/zafproct/.composer
    - /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction --ignore-platform-reqs
    - cp .env.cpanel .env
    - mkdir -p storage/framework/views storage/framework/cache storage/framework/sessions storage/framework/testing storage/logs storage/app/public bootstrap/cache
    - /usr/local/bin/php artisan optimize:clear
    - /usr/local/bin/php artisan migrate --force
    - /usr/local/bin/php artisan config:cache
    - /usr/local/bin/php artisan route:cache
    - /usr/local/bin/php artisan view:cache
    - /usr/local/bin/php artisan storage:link
    - chmod -R 775 storage bootstrap/cache
    - rm -rf /home/zafproct/public_html
    - cp -r public /home/zafproct/public_html
    - sed -i "s|__DIR__\.'/\.\./|'/home/zafproct/repositories/ZAFProctor/|g" /home/zafproct/public_html/index.php
    - git checkout -- . 2>/dev/null; git clean -fd 2>/dev/null || true
